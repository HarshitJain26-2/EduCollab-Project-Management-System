<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-container-margin overflow-x-hidden">
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-primary-fixed to-secondary-fixed opacity-40"></div>
<div class="absolute inset-0 academic-pattern"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container rounded-full blur-[120px] opacity-20"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary-container rounded-full blur-[100px] opacity-20"></div>
</div>
<main class="relative z-10 w-full max-w-md">
<div class="glass-panel rounded-xl shadow-[0_8px_32px_rgba(63,81,181,0.12)] p-lg md:p-xl">
<header class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary-container/20 mb-md">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">history_edu</span>
</div>
<h1 class="font-h1 text-h1 text-primary text-center">EduCollab</h1>
<p class="font-body-md text-on-surface-variant text-center mt-sm">Your collaborative academic hub</p>
</header>
<form class="space-y-lg">
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs" for="email">
<span class="material-symbols-outlined text-[16px]">alternate_email</span>
                        EMAIL ADDRESS
                    </label>
<input class="w-full h-12 px-md rounded-lg bg-white/50 border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 outline-none font-body-md text-on-surface" id="email" placeholder="student@university.edu" type="email"/>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs" for="password">
<span class="material-symbols-outlined text-[16px]">lock</span>
                            PASSWORD
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md rounded-lg bg-white/50 border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 outline-none font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-sm">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-label-sm text-on-surface-variant" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-body-md font-semibold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm">
                    Sign In
                    <span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex items-center w-full gap-md">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-on-surface-variant text-[10px]">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-md w-full">
<button class="h-12 bg-white/50 border border-outline-variant rounded-lg font-label-sm text-on-surface hover:bg-white/80 transition-colors flex items-center justify-center gap-sm">

                        Google
                    </button>

<span class="material-symbols-outlined text-[18px]">school</span>
                        SAML
                    </button>
</div>
<p class="font-body-md text-on-surface-variant mt-md">
                    New to EduCollab?

</p>

<div class="fixed top-xl right-xl hidden lg:block max-w-xs">
<div class="glass-panel p-md rounded-xl space-y-sm">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">tips_and_updates</span>
</div>
<div>
<h3 class="font-label-sm text-on-surface">Pro Tip</h3>
